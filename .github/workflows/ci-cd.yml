name: ci-cd

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "Target platform"
        type: choice
        required: true
        default: "none"
        options:
          - none
          - railway
          - flyio
          - render
          - vps

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build server image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          push: false
          tags: traingame-server:test

      - name: Build client image
        uses: docker/build-push-action@v6
        with:
          context: ./client
          file: ./client/Dockerfile
          push: false
          tags: traingame-client:test

      - name: Node tests (server)
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: |
          if [ -f server/package.json ]; then
            cd server
            npm ci
            npm test --if-present
          else
            echo "No server/package.json found, skipping tests"
          fi

      - name: Migration dry-run
        run: |
          if [ -f server/package.json ]; then
            cd server
            npm run db:migrate:status --if-present
          else
            echo "No migration command available"
          fi

  deploy:
    needs: build-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push release images
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_PREFIX }}/server:${{ github.sha }}
            ghcr.io/${{ env.IMAGE_PREFIX }}/server:latest

      - name: Build and push client image
        uses: docker/build-push-action@v6
        with:
          context: ./client
          file: ./client/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_PREFIX }}/client:${{ github.sha }}
            ghcr.io/${{ env.IMAGE_PREFIX }}/client:latest

      - name: Deploy to Railway
        if: github.event.inputs.deploy_target == 'railway'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          npm i -g @railway/cli
          railway up --service traingame-api --detach

      - name: Deploy to Fly.io
        if: github.event.inputs.deploy_target == 'flyio'
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          curl -L https://fly.io/install.sh | sh
          export PATH="$HOME/.fly/bin:$PATH"
          fly deploy --remote-only

      - name: Deploy to Render
        if: github.event.inputs.deploy_target == 'render'
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK"

      - name: Deploy to VPS + rollback on failed healthcheck
        if: github.event.inputs.deploy_target == 'vps'
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh -o StrictHostKeyChecking=no "$SSH_USER@$SSH_HOST" 'bash -s' < scripts/deploy_vps.sh
